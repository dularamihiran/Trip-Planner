<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 Upload Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            border: 2px solid #10b981;
            border-radius: 10px;
            padding: 20px;
        }
        h1 { color: #10b981; }
        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #059669; }
        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        .info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #3b82f6;
            margin-bottom: 20px;
        }
        img {
            max-width: 100%;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 S3 Upload Test</h1>
        
        <div class="info">
            <strong>Testing:</strong> Backend S3 Upload API<br>
            <strong>Endpoint:</strong> http://localhost:5000/api/upload/single<br>
            <strong>Bucket:</strong> trip-planner-hotels
        </div>

        <input type="file" id="fileInput" accept="image/*">
        <button id="uploadBtn" onclick="testUpload()">Upload Test Image</button>
        
        <div id="result"></div>
    </div>

    <script>
        async function testUpload() {
            const fileInput = document.getElementById('fileInput');
            const resultDiv = document.getElementById('result');
            const uploadBtn = document.getElementById('uploadBtn');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                resultDiv.innerHTML = '<div class="result error">Please select an image first!</div>';
                return;
            }

            const file = fileInput.files[0];
            
            // Validate file type
            if (!file.type.startsWith('image/')) {
                resultDiv.innerHTML = '<div class="result error">Please select an image file!</div>';
                return;
            }

            uploadBtn.disabled = true;
            resultDiv.innerHTML = '<div class="result info">⏳ Uploading...</div>';

            try {
                const formData = new FormData();
                formData.append('image', file);
                formData.append('folder', 'test-uploads');

                const response = await fetch('http://localhost:5000/api/upload/single', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <strong>✅ Upload Successful!</strong><br>
                            <strong>URL:</strong> <a href="${data.url}" target="_blank">${data.url}</a><br>
                            <strong>Key:</strong> ${data.key}<br>
                            <img src="${data.url}" alt="Uploaded image">
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <strong>❌ Upload Failed</strong><br>
                            ${data.error || 'Unknown error'}
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <strong>❌ Error:</strong><br>
                        ${error.message}
                    </div>
                `;
            } finally {
                uploadBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
